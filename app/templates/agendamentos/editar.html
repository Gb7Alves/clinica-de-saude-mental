{% extends "base.html" %}

{% block title %}Editar Agendamento - Clínica de Saúde Mental{% endblock %}

{% block extra_css %}
<style>
    .form-section {
        background: white;
        border-radius: 10px;
        padding: 25px;
        margin-bottom: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .form-section-title {
        font-size: 16px;
        font-weight: 600;
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #0066cc;
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }

    .form-group {
        margin-bottom: 0;
    }

    .form-group.full {
        grid-column: 1 / -1;
    }

    .info-note {
        background: #f0f7ff;
        border-left: 4px solid #0066cc;
        padding: 12px 15px;
        border-radius: 4px;
        font-size: 13px;
        color: #555;
        margin-top: 8px;
    }

    .hidden-field {
        display: none;
    }

    .hidden-field.show {
        display: block;
    }

    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }

        .form-group.full {
            grid-column: 1;
        }
    }
</style>
{% endblock %}

{% block content %}
<h2>Editar Agendamento</h2>

<div class="form-section">
    <div class="form-section-title">Editar Informações do Agendamento</div>
    
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="paciente_id">Paciente *</label>
                <select id="paciente_id" name="paciente_id" required>
                    <option value="">Selecione um paciente</option>
                    {% for paciente in pacientes %}
                    <option value="{{ paciente.id }}" {% if paciente.id == agendamento.paciente_id %}selected{% endif %}>
                        {{ paciente.nome }} (CPF: {{ paciente.cpf|format_cpf }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="profissional_id">Profissional *</label>
                <select id="profissional_id" name="profissional_id" required>
                    <option value="">Selecione um profissional</option>
                    {% for profissional in profissionais %}
                    <option value="{{ profissional.id }}"
                            {% if profissional.id == agendamento.profissional_id %}selected{% endif %}>
                        {{ profissional.nome }} ({{ profissional.especialidade }})
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="data_agendamento">Data do Agendamento *</label>
                <input type="date" id="data_agendamento" name="data_agendamento"
                       value="{{ agendamento.data_agendamento.strftime('%Y-%m-%d') }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="hora_inicio">Hora de Início *</label>
                <input type="time" id="hora_inicio" name="hora_inicio"
                       value="{{ agendamento.hora_inicio.strftime('%H:%M') if agendamento.hora_inicio else '' }}" required>
            </div>

            <div class="form-group">
                <label for="hora_fim">Hora de Término *</label>
                <input type="time" id="hora_fim" name="hora_fim"
                       value="{{ agendamento.hora_fim.strftime('%H:%M') if agendamento.hora_fim else '' }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="consultorio_sala">Consultório / Sala *</label>
                <select id="consultorio_sala" name="consultorio_sala" required onchange="toggleCustomRoom()">
                    <option value="">Selecione uma sala</option>
                    <option value="Sala 1" {% if agendamento.consultorio_sala == 'Sala 1' %}selected{% endif %}>Sala 1</option>
                    <option value="Sala 2" {% if agendamento.consultorio_sala == 'Sala 2' %}selected{% endif %}>Sala 2</option>
                    <option value="Sala 3" {% if agendamento.consultorio_sala == 'Sala 3' %}selected{% endif %}>Sala 3</option>
                    <option value="Sala 4" {% if agendamento.consultorio_sala == 'Sala 4' %}selected{% endif %}>Sala 4</option>
                    <option value="Sala Infantil" {% if agendamento.consultorio_sala == 'Sala Infantil' %}selected{% endif %}>Sala Infantil</option>
                    <option value="Sala de Grupos" {% if agendamento.consultorio_sala == 'Sala de Grupos' %}selected{% endif %}>Sala de Grupos</option>
                    <option value="Sala de Supervisão" {% if agendamento.consultorio_sala == 'Sala de Supervisão' %}selected{% endif %}>Sala de Supervisão</option>
                    <option value="Outros" {% if agendamento.consultorio_sala and agendamento.consultorio_sala not in ['Sala 1', 'Sala 2', 'Sala 3', 'Sala 4', 'Sala Infantil', 'Sala de Grupos', 'Sala de Supervisão'] %}selected{% endif %}>Outros</option>
                </select>
            </div>

            <div class="form-group">
                <label for="status">Status *</label>
                <select id="status" name="status" required>
                    <option value="Agendado" {% if agendamento.status == 'Agendado' %}selected{% endif %}>Agendado</option>
                    <option value="Realizado" {% if agendamento.status == 'Realizado' %}selected{% endif %}>Realizado</option>
                    <option value="Cancelado" {% if agendamento.status == 'Cancelado' %}selected{% endif %}>Cancelado</option>
                    <option value="Reagendado" {% if agendamento.status == 'Reagendado' %}selected{% endif %}>Reagendado</option>
                    <option value="Não compareceu" {% if agendamento.status == 'Não compareceu' %}selected{% endif %}>Não compareceu</option>
                </select>
            </div>
        </div>

        <div class="form-row {% if agendamento.consultorio_sala and agendamento.consultorio_sala not in ['Sala 1', 'Sala 2', 'Sala 3', 'Sala 4', 'Sala Infantil', 'Sala de Grupos', 'Sala de Supervisão'] %}hidden-field show{% else %}hidden-field{% endif %}" id="customRoomField">
            <div class="form-group full">
                <label for="consultorio_sala_customizada">Especifique a Sala *</label>
                <input type="text" id="consultorio_sala_customizada" name="consultorio_sala_customizada" 
                       value="{{ agendamento.consultorio_sala or '' }}" placeholder="Ex: Sala 201, Consultório A, Sala de Atendimento Especial">
                <div class="info-note">
                    ℹ️ Digite o nome da sala quando selecionar "Outros"
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group full">
                <label for="observacoes">Observações</label>
                <textarea id="observacoes" name="observacoes" placeholder="Adicione ou edite observações sobre o agendamento...">{{ agendamento.observacoes or '' }}</textarea>
            </div>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('agendamentos.ver_agendamento', id=agendamento.id) }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">Salvar Alterações</button>
        </div>
    </form>
</div>

<script>
    function toggleCustomRoom() {
        const room = document.getElementById('consultorio_sala').value;
        const customField = document.getElementById('customRoomField');
        const customInput = document.getElementById('consultorio_sala_customizada');
        
        if (room === 'Outros') {
            customField.classList.add('show');
            customInput.required = true;
        } else {
            customField.classList.remove('show');
            customInput.required = false;
            customInput.value = '';
        }
    }

    // Verificar ao carregar a página
    document.addEventListener('DOMContentLoaded', function() {
        toggleCustomRoom();
    });
</script>

{% endblock %}
